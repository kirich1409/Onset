name: CodeQL Analysis

on:
  schedule:
    # Weekly on Monday at 03:00 UTC — off PR critical path (20-30 min compile).
    - cron: '0 3 * * 1'
  push:
    branches: [main]
  workflow_dispatch:

# Non-required, informational only. Does not block PR merges.
# Copilot Autofix will propose fix-PRs for CodeQL alerts (verify Swift
# Autofix support on docs.github.com before relying on it — coverage is
# narrower than CodeQL Swift GA).

permissions:
  contents: read
  security-events: write
  # actions: read is needed by codeql-action on private repos; harmless for public.
  actions: read

env:
  DEVELOPER_DIR: /Applications/Xcode_26.5.app

jobs:
  analyze:
    name: CodeQL (Swift)
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Confirm Xcode version
        run: xcodebuild -version

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: swift
          # build-mode: manual is required for Swift — autobuild is unreliable
          # for macOS app targets. We drive xcodebuild explicitly below.
          build-mode: manual

      - name: Build for CodeQL
        # Release configuration gives CodeQL the most complete analysis
        # (WMO exposes more symbols). Slow — acceptable in async/scheduled context.
        run: |
          xcodebuild build \
            -scheme Onset \
            -destination 'platform=macOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: /language:swift
