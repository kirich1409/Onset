name: PR Gate

on:
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same PR branch when a new commit is pushed.
# Excluded from merge_group and push (those run on main) — cancelling a main
# run would break the commit history record.
concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least-privilege default. Individual jobs grant only what they need.
permissions:
  contents: read

env:
  DEVELOPER_DIR: /Applications/Xcode_26.5.app

jobs:
  # ─────────────────────────────────────────────
  # build
  # Debug configuration: -Onone, ONLY_ACTIVE_ARCH=YES, no WMO — fastest compile.
  # Full strictness comes from Config/Strict.xcconfig (SWIFT_VERSION=6.0,
  # SWIFT_STRICT_CONCURRENCY=complete, SWIFT_TREAT_WARNINGS_AS_ERRORS=YES,
  # SWIFT_STRICT_MEMORY_SAFETY=YES, upcoming-feature flags).
  # Strict flags are frontend-phase only and don't slow codegen.
  # ─────────────────────────────────────────────
  build:
    name: Build (Debug)
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Fail-fast: verify Xcode 26.5 exists on the runner image before attempting build.
      # GitHub rotates Xcode versions on macos-* images; a missing directory produces
      # cryptic errors later. Fail immediately with clear feedback for recovery.
      - name: Verify Xcode 26.5
        run: |
          if [ ! -d "/Applications/Xcode_26.5.app" ]; then
            echo "::error::Xcode 26.5 not found on runner (image rotated versions). Update DEVELOPER_DIR and target SDK."
            exit 1
          fi
          xcodebuild -version

      # Diagnostic: confirm the actual Xcode selected before any build step.
      # A wrong DEVELOPER_DIR produces a cryptic "No such file" error otherwise.
      - name: Confirm Xcode version
        run: xcodebuild -version

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Cache DerivedData
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/Library/Developer/Xcode/DerivedData/Onset-*
          key: deriveddata-${{ runner.os }}-${{ hashFiles('Onset.xcodeproj/project.pbxproj', '**/*.xcconfig') }}
          restore-keys: |
            deriveddata-${{ runner.os }}-

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme Onset \
            -destination 'platform=macOS' \
            -configuration Debug \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color

      - name: Stage app for artifact upload
        run: |
          mkdir -p ci-artifacts
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "Onset.app" -path "*/Products/Debug/*" 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: Onset.app not found in DerivedData"
            exit 1
          fi
          cp -R "$APP" ci-artifacts/

      # Upload the built .app as an artifact so artifact-checks can consume it
      # in the same workflow run without re-building.
      - name: Upload app artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Onset-app-${{ github.run_id }}
          path: ci-artifacts/
          if-no-files-found: error
          retention-days: 1

  # ─────────────────────────────────────────────
  # lint
  # Runs parallel to build — requires no compilation.
  # SwiftFormat 0.61.1 is pre-installed on macos-26-arm64; SwiftLint is not.
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: macos-26
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install SwiftLint
        # brew pulls latest SwiftLint. This is intentional for MVP: pinning requires
        # a binary download step or a Mint lockfile; add Mint-pinning in a follow-up.
        # TODO: pin SwiftLint version via Mint or direct binary download.
        run: brew install swiftlint

      - name: SwiftLint (strict)
        run: swiftlint lint --strict --config .swiftlint.yml

      - name: SwiftFormat (lint mode)
        # SwiftFormat 0.61.1 pre-installed on macos-26-arm64 runner.
        run: swiftformat --lint .

  # ─────────────────────────────────────────────
  # unit
  # Swift Testing via xcodebuild test — OnsetTests only (Onset.xcscheme Test action
  # references OnsetTests.xctest; OnsetUITests is NOT wired → no UI tests here).
  # ─────────────────────────────────────────────
  unit:
    name: Unit Tests
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Confirm Xcode version
        run: xcodebuild -version

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme Onset \
            -destination 'platform=macOS' \
            -configuration Debug \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color

  # ─────────────────────────────────────────────
  # artifact-checks
  # Downstream of build — depends on the uploaded .app artifact.
  # Checks entitlements and absence of network framework linkage on the
  # BUILT binary, not the source .entitlements file (xcodebuild injects
  # entitlements; source-only check gives false pass/fail).
  # Also lints PrivacyInfo.xcprivacy if present.
  # ─────────────────────────────────────────────
  artifact-checks:
    name: Artifact Checks
    runs-on: macos-26
    needs: build
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download app artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Onset-app-${{ github.run_id }}
          path: ci-artifacts/

      - name: Locate .app bundle
        id: locate
        run: |
          APP_PATH=$(find ci-artifacts -name "Onset.app" -maxdepth 3 | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Onset.app not found in downloaded artifact"
            exit 1
          fi
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Located: $APP_PATH"

      - name: Check entitlements
        run: scripts/check-entitlements.sh "${{ steps.locate.outputs.app_path }}"

      - name: Check no-network (static)
        run: scripts/check-no-network.sh "${{ steps.locate.outputs.app_path }}"

      - name: Lint PrivacyInfo.xcprivacy
        # Non-fatal if missing — PrivacyInfo.xcprivacy is a TODO for the app target.
        # When required-reason APIs (e.g. UserDefaults) are added, this must be present.
        # TODO: make this fatal once PrivacyInfo.xcprivacy is added to the target.
        run: |
          PRIVACY_MANIFEST=$(find "${{ steps.locate.outputs.app_path }}" -name "PrivacyInfo.xcprivacy" | head -1)
          if [ -z "$PRIVACY_MANIFEST" ]; then
            echo "WARNING: PrivacyInfo.xcprivacy not found in built .app — add it before using required-reason APIs"
          else
            echo "Found PrivacyInfo.xcprivacy at: $PRIVACY_MANIFEST"
            # Validate XML is well-formed
            plutil -lint "$PRIVACY_MANIFEST" && echo "PrivacyInfo.xcprivacy is valid"
          fi
