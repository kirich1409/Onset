name: PR Gate

on:
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same PR branch when a new commit is pushed.
# Excluded from merge_group and push (those run on main) — cancelling a main
# run would break the commit history record.
concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least-privilege default. Individual jobs grant only what they need.
permissions:
  contents: read

env:
  DEVELOPER_DIR: /Applications/Xcode_26.5.app

jobs:
  # ─────────────────────────────────────────────
  # changes
  # Cheaply detect which file categories changed so downstream jobs can skip
  # when irrelevant (e.g. doc-only PRs skip all Swift jobs entirely).
  # Runs on ubuntu-latest — no macOS runner cost.
  # Outputs:
  #   swift   — Swift source, project, or lint-config changed
  #   privacy — PrivacyInfo.xcprivacy changed
  # ─────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      swift: ${{ steps.detect.outputs.swift }}
      privacy: ${{ steps.detect.outputs.privacy }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Detect changed file categories
        id: detect
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.sha }}
        run: |
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          echo "Changed files:"
          echo "$CHANGED"

          SWIFT=false
          PRIVACY=false

          # Swift category: source files, project, build config, lint config, CI itself.
          if echo "$CHANGED" | grep -qE \
            '\.(swift|xcconfig)$|Onset\.xcodeproj/|\.swiftlint\.yml$|\.swiftformat$|^Mintfile$|^\.github/workflows/pr-gate\.yml$'; then
            SWIFT=true
          fi

          # Privacy category: the PrivacyInfo manifest (source check).
          if echo "$CHANGED" | grep -qE 'Onset/PrivacyInfo\.xcprivacy$'; then
            PRIVACY=true
          fi

          echo "swift=$SWIFT"   >> "$GITHUB_OUTPUT"
          echo "privacy=$PRIVACY" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────
  # build
  # Debug configuration: -Onone, ONLY_ACTIVE_ARCH=YES, no WMO — fastest compile.
  # Full strictness comes from Config/Strict.xcconfig (SWIFT_VERSION=6.0,
  # SWIFT_STRICT_CONCURRENCY=complete, SWIFT_TREAT_WARNINGS_AS_ERRORS=YES,
  # SWIFT_STRICT_MEMORY_SAFETY=YES, upcoming-feature flags).
  # Strict flags are frontend-phase only and don't slow codegen.
  # ─────────────────────────────────────────────
  build:
    name: Build (Debug)
    needs: changes
    if: needs.changes.outputs.swift == 'true'
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Fail-fast: verify Xcode 26.5 exists on the runner image before attempting build.
      # GitHub rotates Xcode versions on macos-* images; a missing directory produces
      # cryptic errors later. Fail immediately with clear feedback for recovery.
      - name: Verify Xcode 26.5
        run: |
          if [ ! -d "/Applications/Xcode_26.5.app" ]; then
            echo "::error::Xcode 26.5 not found on runner (image rotated versions). Update DEVELOPER_DIR and target SDK."
            exit 1
          fi
          xcodebuild -version

      # Diagnostic: confirm the actual Xcode selected before any build step.
      # A wrong DEVELOPER_DIR produces a cryptic "No such file" error otherwise.
      - name: Confirm Xcode version
        run: xcodebuild -version

      - name: Cache DerivedData
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/Library/Developer/Xcode/DerivedData/Onset-*
          key: deriveddata-${{ runner.os }}-${{ hashFiles('Onset.xcodeproj/project.pbxproj', '**/*.xcconfig') }}
          restore-keys: |
            deriveddata-${{ runner.os }}-

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme Onset \
            -destination 'platform=macOS' \
            -configuration Debug \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      - name: Stage app for artifact upload
        run: |
          mkdir -p ci-artifacts
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "Onset.app" -path "*/Products/Debug/*" 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: Onset.app not found in DerivedData"
            exit 1
          fi
          cp -R "$APP" ci-artifacts/

      # Upload the built .app as an artifact so artifact-checks can consume it
      # in the same workflow run without re-building.
      - name: Upload app artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Onset-app-${{ github.run_id }}
          path: ci-artifacts/
          if-no-files-found: error
          retention-days: 1

  # ─────────────────────────────────────────────
  # lint
  # Runs parallel to build — requires no compilation.
  # SwiftFormat 0.61.1 is pre-installed on macos-26-arm64; SwiftLint is not.
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.swift == 'true'
    runs-on: macos-26
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Read the pinned version from Mintfile so the download and cache key
      # stay in sync with the single source of truth.
      - name: Resolve SwiftLint version from Mintfile
        id: swiftlint-version
        run: echo "version=$(grep -oE '[^@]+$' Mintfile)" >> "$GITHUB_OUTPUT"

      # Cache the downloaded .pkg by OS + version.
      # The pkg is a pre-built binary — it is NOT compiled by the active Xcode
      # toolchain, so the cache key is toolchain-independent and safe across
      # Xcode bumps.
      - name: Cache SwiftLint package
        id: cache-swiftlint
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/SwiftLint.pkg
          key: swiftlint-pkg-${{ runner.os }}-${{ steps.swiftlint-version.outputs.version }}

      - name: Download SwiftLint package
        if: steps.cache-swiftlint.outputs.cache-hit != 'true'
        run: |
          curl -fsSLo /tmp/SwiftLint.pkg \
            "https://github.com/realm/SwiftLint/releases/download/${{ steps.swiftlint-version.outputs.version }}/SwiftLint.pkg"

      # Installs to /usr/local/bin/swiftlint — deterministic, no PATH ambiguity.
      # SwiftLint is not pre-installed on macos-26, so this is the only binary.
      - name: Install SwiftLint (pinned)
        run: |
          sudo installer -pkg /tmp/SwiftLint.pkg -target /
          swiftlint version

      - name: SwiftLint (strict)
        run: swiftlint lint --strict --config .swiftlint.yml

      - name: SwiftFormat (lint mode)
        # SwiftFormat 0.61.1 pre-installed on macos-26-arm64 runner.
        run: swiftformat --lint .

  # ─────────────────────────────────────────────
  # unit
  # Swift Testing via xcodebuild test — OnsetTests only (Onset.xcscheme Test action
  # references OnsetTests.xctest; OnsetUITests is NOT wired → no UI tests here).
  # ─────────────────────────────────────────────
  unit:
    name: Unit Tests
    needs: changes
    if: needs.changes.outputs.swift == 'true'
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Confirm Xcode version
        run: xcodebuild -version

      - name: Run unit tests
        run: |
          set -o pipefail
          RESULT_BUNDLE="$RUNNER_TEMP/OnsetTests.xcresult"
          # Export before xcodebuild so the always() summary/upload steps below
          # can find the bundle even when the test run fails.
          echo "RESULT_BUNDLE=$RESULT_BUNDLE" >> "$GITHUB_ENV"
          # $RUNNER_TEMP is wiped per job, so the path won't pre-exist
          # (-resultBundlePath errors if it does). Coverage is scoped to the
          # Onset target by Onset.xctestplan; -enableCodeCoverage is a guard.
          xcodebuild test \
            -scheme Onset \
            -destination 'platform=macOS' \
            -configuration Debug \
            -resultBundlePath "$RESULT_BUNDLE" \
            -enableCodeCoverage YES \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      # Render test pass/fail counts + per-target coverage into the run's Summary
      # tab. if: always() so it reports on failure too; as a separate step it
      # cannot turn a failed test run green. Report-only — set ONSET_COVERAGE_MIN
      # here later to enforce a floor.
      - name: Coverage & test summary
        if: always()
        run: scripts/coverage-summary.sh "$RESULT_BUNDLE"

      # .xcresult is a bundle (directory) — ditto, not zip, preserves its layout.
      - name: Zip result bundle
        if: always()
        run: |
          if [ -d "$RESULT_BUNDLE" ]; then
            ditto -c -k --keepParent "$RESULT_BUNDLE" "$RUNNER_TEMP/OnsetTests.xcresult.zip"
          fi

      - name: Upload result bundle
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: OnsetTests-xcresult-${{ github.run_id }}
          path: ${{ runner.temp }}/OnsetTests.xcresult.zip
          if-no-files-found: warn
          retention-days: 7

  # ─────────────────────────────────────────────
  # privacy-manifest
  # Static lint of Onset/PrivacyInfo.xcprivacy — no build required, so it runs
  # in parallel with build/lint/unit. Fatal: fails the PR if the manifest is
  # missing, declares no UserDefaults reasons, or uses a non-Apple reason code.
  # ─────────────────────────────────────────────
  privacy-manifest:
    name: Privacy Manifest Lint
    needs: changes
    if: needs.changes.outputs.privacy == 'true'
    runs-on: macos-26
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Lint PrivacyInfo.xcprivacy (static, source)
        run: scripts/check-privacy-manifest.sh Onset/PrivacyInfo.xcprivacy

  # ─────────────────────────────────────────────
  # artifact-checks
  # Downstream of build — depends on the uploaded .app artifact.
  # Checks entitlements and absence of network framework linkage on the
  # BUILT binary, not the source .entitlements file (xcodebuild injects
  # entitlements; source-only check gives false pass/fail).
  # Also lints PrivacyInfo.xcprivacy if present.
  # ─────────────────────────────────────────────
  artifact-checks:
    name: Artifact Checks
    needs: [changes, build]
    if: needs.changes.outputs.swift == 'true'
    runs-on: macos-26
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download app artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Onset-app-${{ github.run_id }}
          path: ci-artifacts/

      - name: Locate .app bundle
        id: locate
        run: |
          APP_PATH=$(find ci-artifacts -name "Onset.app" -maxdepth 3 | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Onset.app not found in downloaded artifact"
            exit 1
          fi
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Located: $APP_PATH"

      - name: Check entitlements
        run: scripts/check-entitlements.sh "${{ steps.locate.outputs.app_path }}"

      - name: Check no-network (static)
        run: scripts/check-no-network.sh "${{ steps.locate.outputs.app_path }}"

      # Verifies PrivacyInfo.xcprivacy is present in the built .app bundle, then
      # runs the same content lint as the parallel privacy-manifest job against
      # the shipped copy.
      - name: Lint PrivacyInfo.xcprivacy (bundled)
        run: |
          PRIVACY_MANIFEST=$(find "${{ steps.locate.outputs.app_path }}" -name "PrivacyInfo.xcprivacy" | head -1)
          if [ -z "$PRIVACY_MANIFEST" ]; then
            echo "::error::PrivacyInfo.xcprivacy not found in built .app"
            exit 1
          fi
          echo "Found PrivacyInfo.xcprivacy at: $PRIVACY_MANIFEST"
          scripts/check-privacy-manifest.sh "$PRIVACY_MANIFEST"
