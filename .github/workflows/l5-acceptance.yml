name: L5 Acceptance (Self-Hosted)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger (for audit log)'
        required: false
        type: string
  push:
    branches: [main]
  # Label-based trigger for M1 Air final gate: add label "l5-m1air" to a PR.
  # Handled by a separate job (see m1air-gate below).
  pull_request:
    types: [labeled]

# SECURITY: This workflow runs on self-hosted hardware (dev machine).
# NEVER trigger on pull_request from forks — that executes untrusted code on
# the dev machine. The pull_request trigger above is restricted to the labeled
# event only, which requires a maintainer to manually add the label.
# "Require approval for first-time contributors" must be enabled in repo settings.

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # m3max-acceptance
  # Per-task L5 on M3 Max dev machine.
  # Runs on: workflow_dispatch OR push to main.
  # ─────────────────────────────────────────────
  m3max-acceptance:
    name: L5 Acceptance (M3 Max)
    # TODO: register the self-hosted runner with these labels in GitHub repo settings.
    # Runner registration is a Human step (requires physical access to the machine).
    # Command: ./config.sh --url https://github.com/kirich1409/Onset --token <TOKEN>
    #          --labels "self-hosted,macos,m3max"
    runs-on: [self-hosted, macos, m3max]
    # Only run on dispatch or push to main — never on fork PR.
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Pre-job DerivedData cleanup prevents cache-poisoning across runs:
      # a poisoned cache could hide build failures or carry over stale artifacts.
      - name: Clean DerivedData
        run: rm -rf ~/Library/Developer/Xcode/DerivedData/Onset-*

      - name: Confirm Xcode version
        run: xcodebuild -version

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Build (Debug)
        env:
          DEVELOPER_DIR: /Applications/Xcode_26.5.app
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme Onset \
            -destination 'platform=macOS' \
            -configuration Debug \
            ONLY_ACTIVE_ARCH=YES \
            | xcpretty --color

      # ── L5 Hardware Acceptance ────────────────────────────────────────────
      # TODO: implement hardware-specific acceptance steps below.
      # These require real hardware (AVCaptureSession, screen recording, etc.)
      # and cannot run on GitHub-hosted virtual runners.
      #
      # Planned steps (from recording-spec AC):
      #   AC-4  ffprobe CFR check — verify recorded video is constant frame rate
      #   AC-7  sync check — verify audio/video synchronization within threshold
      #   AC-10 crash-injection — kill -9 during recording, verify file integrity
      #   L2    ~/Movies/Onset/ permissions — owner-only (no group/other)
      #   nettop runtime check — confirm no network activity during recording
      #
      # Each step should:
      #   - Launch the built Onset.app
      #   - Perform the hardware interaction (start recording, etc.)
      #   - Assert the expected outcome
      #   - Quit/kill the app cleanly
      #
      # See docs/specs/2026-06-02-onset-recording-mvp.md for full AC list.
      # ─────────────────────────────────────────────────────────────────────
      - name: L5 acceptance placeholder
        run: |
          echo "TODO: implement L5 hardware acceptance steps"
          echo "See workflow comments for planned steps"
          # Locate the built app for manual inspection during development
          find ~/Library/Developer/Xcode/DerivedData/Onset-*/Build/Products/Debug \
            -name "Onset.app" -maxdepth 1 2>/dev/null && echo "App found" || echo "App not found"

  # ─────────────────────────────────────────────
  # m1air-gate
  # Final MVP gate on M1 Air (weak-edge test).
  # Triggered by maintainer adding label "l5-m1air" to a PR.
  # Not per-task — only for final MVP validation.
  # ─────────────────────────────────────────────
  m1air-gate:
    name: L5 Final Gate (M1 Air)
    runs-on: [self-hosted, macos, m1air]
    # Only run when the specific label is added — never on untriggered pull_request.
    if: github.event_name == 'pull_request' && github.event.label.name == 'l5-m1air'
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Clean DerivedData
        run: rm -rf ~/Library/Developer/Xcode/DerivedData/Onset-*

      - name: Confirm Xcode version
        run: xcodebuild -version

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Build (Debug)
        env:
          DEVELOPER_DIR: /Applications/Xcode_26.5.app
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme Onset \
            -destination 'platform=macOS' \
            -configuration Debug \
            ONLY_ACTIVE_ARCH=YES \
            | xcpretty --color

      # TODO: same L5 hardware acceptance steps as m3max-acceptance, tuned for M1 Air.
      # M1 Air is the weak-edge test: verifies the app is usable at lower performance.
      # Register runner: labels "self-hosted,macos,m1air"
      - name: L5 acceptance placeholder (M1 Air)
        run: |
          echo "TODO: implement L5 hardware acceptance steps for M1 Air"
