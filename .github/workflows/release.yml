name: Release

on:
  push:
    tags:
      - 'v*'

# Least-privilege default. contents: write is scoped to the create-release job only.
#
# Required secrets (Human sets these up in repo Settings > Environments > release):
#   APPLE_TEAM_ID                    — 10-char Apple Developer Team ID (e.g. ABCDE12345)
#   DEVELOPER_ID_CERT_P12            — Developer ID Application cert (.p12, base64-encoded)
#   DEVELOPER_ID_CERT_PASSWORD       — Password for the .p12 file
#   APP_STORE_CONNECT_KEY_ID         — App Store Connect API Key ID (e.g. ABCD123456)
#   APP_STORE_CONNECT_ISSUER_ID      — App Store Connect API Issuer ID (UUID)
#   APP_STORE_CONNECT_PRIVATE_KEY    — App Store Connect API private key (.p8 file contents)
#
# Steps are guarded: absent secrets → immediate fail with a diagnostic message.
# See: docs/devops/notarization-runbook.md

permissions:
  contents: read

env:
  DEVELOPER_DIR: /Applications/Xcode_26.5.app
  KEYCHAIN_NAME: onset-release-${{ github.run_id }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # build-notarize
  # Archive (Release/WMO), sign with Developer ID, notarize, staple, create DMG.
  # Secrets are accessed here via the "release" environment (environment-scoped,
  # not repo-wide). contents: read — no GitHub Release writes in this job.
  # ─────────────────────────────────────────────────────────────────────────
  build-notarize:
    name: Archive, Sign, Notarize
    runs-on: macos-26
    environment: release  # Enforces environment protection rules + scoped secrets.
    timeout-minutes: 60
    permissions:
      contents: read  # Only reads source; GitHub Release is created in create-release.

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Confirm Xcode version
        run: xcodebuild -version

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      # Guard: fail fast if signing secrets are absent.
      # Absent secrets are empty strings in the runner environment, so -z is reliable.
      - name: Verify signing secrets are set
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEVELOPER_ID_CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          missing=()
          [ -z "$APPLE_TEAM_ID" ]             && missing+=("APPLE_TEAM_ID")
          [ -z "$DEVELOPER_ID_CERT_P12" ]     && missing+=("DEVELOPER_ID_CERT_P12")
          [ -z "$DEVELOPER_ID_CERT_PASSWORD" ] && missing+=("DEVELOPER_ID_CERT_PASSWORD")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Signing secrets absent: ${missing[*]}"
            echo "::error::Add them to the 'release' GitHub Environment."
            echo "::error::See: docs/devops/notarization-runbook.md"
            exit 1
          fi

      # Guard: fail fast if notarization secrets are absent.
      - name: Verify notarization secrets are set
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          missing=()
          [ -z "$APP_STORE_CONNECT_KEY_ID" ]      && missing+=("APP_STORE_CONNECT_KEY_ID")
          [ -z "$APP_STORE_CONNECT_ISSUER_ID" ]   && missing+=("APP_STORE_CONNECT_ISSUER_ID")
          [ -z "$APP_STORE_CONNECT_PRIVATE_KEY" ] && missing+=("APP_STORE_CONNECT_PRIVATE_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Notarization secrets absent: ${missing[*]}"
            echo "::error::Add them to the 'release' GitHub Environment."
            echo "::error::See: docs/devops/notarization-runbook.md"
            exit 1
          fi

      # Combine keychain creation and certificate import in a single shell so
      # the trap fires when this step's process exits — guaranteeing cleanup
      # even if the script aborts mid-way (bash-level guarantee).
      # The if: always() step below adds an outer job-level safety net.
      - name: Create keychain and import signing certificate
        env:
          DEVELOPER_ID_CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(uuidgen)
          echo "::add-mask::$KEYCHAIN_PASSWORD"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME.keychain-db"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME.keychain-db"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME.keychain-db"
          # Prepend to keychain search list so code signing finds the identity.
          security list-keychains -d user -s "$KEYCHAIN_NAME.keychain-db" $(security list-keychains -d user | tr -d '"')

          echo "$DEVELOPER_ID_CERT_P12" | base64 --decode > /tmp/onset-signing.p12
          security import /tmp/onset-signing.p12 \
            -k "$KEYCHAIN_NAME.keychain-db" \
            -P "$DEVELOPER_ID_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_NAME.keychain-db"
          # Verify identity is present
          security find-identity -v -p codesigning "$KEYCHAIN_NAME.keychain-db"
          # Scrub the p12 from disk immediately
          rm -f /tmp/onset-signing.p12

      - name: Archive (Release/WMO)
        env:
          VERSION: ${{ steps.version.outputs.version }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -scheme Onset \
            -destination 'generic/platform=macOS' \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Onset-$VERSION.xcarchive" \
            CURRENT_PROJECT_VERSION="$VERSION" \
            MARKETING_VERSION="$VERSION" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID"

      - name: Export archive (Developer ID)
        env:
          VERSION: ${{ steps.version.outputs.version }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Inject the Team ID placeholder from the secret into the committed ExportOptions.plist.
          # sed writes to a temp copy; the committed file retains the XXXXXXXXXX placeholder.
          sed "s/XXXXXXXXXX/$APPLE_TEAM_ID/g" ExportOptions.plist > "$RUNNER_TEMP/ExportOptions-resolved.plist"
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Onset-$VERSION.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions-resolved.plist" \
            -exportPath "$RUNNER_TEMP/export"

      - name: Notarize app
        env:
          VERSION: ${{ steps.version.outputs.version }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          # Write the .p8 private key to a temp file; notarytool requires a file path.
          ASC_KEY_FILE="$RUNNER_TEMP/asc_key.p8"
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > "$ASC_KEY_FILE"
          chmod 600 "$ASC_KEY_FILE"

          # Zip the app for submission (notarytool accepts zip of .app).
          ditto -c -k --keepParent \
            "$RUNNER_TEMP/export/Onset.app" \
            "$RUNNER_TEMP/Onset-$VERSION.zip"

          xcrun notarytool submit \
            "$RUNNER_TEMP/Onset-$VERSION.zip" \
            --key "$ASC_KEY_FILE" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --wait

          # Scrub the key from disk immediately.
          rm -f "$ASC_KEY_FILE"

          xcrun stapler staple "$RUNNER_TEMP/export/Onset.app"

      - name: Create DMG
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          hdiutil create \
            -volname "Onset $VERSION" \
            -srcfolder "$RUNNER_TEMP/export/Onset.app" \
            -ov \
            -format UDZO \
            "$RUNNER_TEMP/Onset-$VERSION.dmg"

      # Notarize the DMG itself — required for offline Gatekeeper verification.
      # An unnotarized DMG fails spctl even if the enclosed .app is notarized.
      - name: Notarize DMG
        env:
          VERSION: ${{ steps.version.outputs.version }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          ASC_KEY_FILE="$RUNNER_TEMP/asc_key_dmg.p8"
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > "$ASC_KEY_FILE"
          chmod 600 "$ASC_KEY_FILE"

          xcrun notarytool submit \
            "$RUNNER_TEMP/Onset-$VERSION.dmg" \
            --key "$ASC_KEY_FILE" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --wait

          rm -f "$ASC_KEY_FILE"

          xcrun stapler staple "$RUNNER_TEMP/Onset-$VERSION.dmg"

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-artifacts-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/Onset-${{ steps.version.outputs.version }}.dmg
            ${{ runner.temp }}/Onset-${{ steps.version.outputs.version }}.zip
          if-no-files-found: error
          retention-days: 1

      # Belt-and-suspenders: covers failures in steps after the keychain/cert step
      # where the trap cannot reach (each run: block is a separate shell process).
      - name: Delete temporary keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_NAME.keychain-db" 2>/dev/null || true
          echo "Keychain cleanup complete"

  # ─────────────────────────────────────────────────────────────────────────
  # create-release
  # Creates the GitHub Release and uploads the notarized .dmg and .zip.
  # This is the only job that needs contents: write; all other jobs use read.
  # Runs on ubuntu-latest — only needs gh CLI, no macOS toolchain.
  # ─────────────────────────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: build-notarize
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write  # Required to create a GitHub Release and upload artifacts.

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts-${{ github.run_id }}
          path: ./artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.build-notarize.outputs.version }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Onset $VERSION" \
            --generate-notes \
            --draft \
            "./artifacts/Onset-$VERSION.dmg" \
            "./artifacts/Onset-$VERSION.zip"
