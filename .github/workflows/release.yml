name: Release

on:
  push:
    tags:
      - 'v*'

# Least-privilege default. contents: write is scoped to the create-release job only.
#
# Required secrets (Human sets these up in repo Settings > Environments > release):
#   DEVELOPER_ID_APPLICATION_P12_BASE64  — Developer ID Application cert (.p12, base64)
#   DEVELOPER_ID_APPLICATION_P12_PASSWORD — .p12 password
#   NOTARYTOOL_APPLE_ID                  — Apple ID for notarytool
#   NOTARYTOOL_APP_SPECIFIC_PASSWORD     — App-specific password for notarytool
#   NOTARYTOOL_TEAM_ID                   — 10-char Apple Developer Team ID

permissions:
  contents: read

env:
  DEVELOPER_DIR: /Applications/Xcode_26.5.app
  KEYCHAIN_NAME: onset-release-${{ github.run_id }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # build-notarize
  # Archive (Release/WMO), sign with Developer ID, notarize, staple, create DMG.
  # Secrets are accessed here via the "release" environment (environment-scoped,
  # not repo-wide). contents: read — no GitHub Release writes in this job.
  # ─────────────────────────────────────────────────────────────────────────
  build-notarize:
    name: Archive, Sign, Notarize
    runs-on: macos-26
    environment: release  # Enforces environment protection rules + scoped secrets.
    timeout-minutes: 60
    permissions:
      contents: read  # Only reads source; GitHub Release is created in create-release.

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Confirm Xcode version
        run: xcodebuild -version

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      # Combine keychain creation and certificate import in a single shell so
      # the trap fires when this step's process exits — guaranteeing cleanup
      # even if the script aborts mid-way (bash-level guarantee).
      # The if: always() step below adds an outer job-level safety net.
      - name: Create keychain and import signing certificate
        env:
          DEVELOPER_ID_APPLICATION_P12_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          DEVELOPER_ID_APPLICATION_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(uuidgen)
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME.keychain-db"
          trap "security delete-keychain '$KEYCHAIN_NAME.keychain-db' 2>/dev/null || true" EXIT
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME.keychain-db"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME.keychain-db"
          # Prepend to keychain search list so code signing finds the identity.
          security list-keychains -d user -s "$KEYCHAIN_NAME.keychain-db" $(security list-keychains -d user | tr -d '"')

          # TODO: Human must set DEVELOPER_ID_APPLICATION_P12_BASE64 and
          # DEVELOPER_ID_APPLICATION_P12_PASSWORD in GitHub Environment "release".
          echo "$DEVELOPER_ID_APPLICATION_P12_BASE64" | base64 --decode > /tmp/onset-signing.p12
          security import /tmp/onset-signing.p12 \
            -k "$KEYCHAIN_NAME.keychain-db" \
            -P "$DEVELOPER_ID_APPLICATION_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_NAME.keychain-db"
          # Verify identity is present
          security find-identity -v -p codesigning "$KEYCHAIN_NAME.keychain-db"
          # Scrub the p12 from disk immediately
          rm -f /tmp/onset-signing.p12

      - name: Archive (Release/WMO)
        run: |
          xcodebuild archive \
            -scheme Onset \
            -destination 'generic/platform=macOS' \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Onset-${{ steps.version.outputs.version }}.xcarchive" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.version }}" \
            MARKETING_VERSION="${{ steps.version.outputs.version }}"

      - name: Export archive (Developer ID)
        run: |
          # TODO: create ExportOptions.plist for Developer ID distribution.
          # Requires DEVELOPMENT_TEAM and signing identity configured.
          # See: xcodebuild -help for exportOptionsPlist keys.
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Onset-${{ steps.version.outputs.version }}.xcarchive" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/export"

      - name: Notarize
        env:
          NOTARYTOOL_APPLE_ID: ${{ secrets.NOTARYTOOL_APPLE_ID }}
          NOTARYTOOL_APP_SPECIFIC_PASSWORD: ${{ secrets.NOTARYTOOL_APP_SPECIFIC_PASSWORD }}
          NOTARYTOOL_TEAM_ID: ${{ secrets.NOTARYTOOL_TEAM_ID }}
        run: |
          # TODO: Human must set notarytool secrets in GitHub Environment "release".
          # Create a zip for notarization (notarytool accepts zip of .app or .dmg).
          ditto -c -k --keepParent \
            "$RUNNER_TEMP/export/Onset.app" \
            "$RUNNER_TEMP/Onset-${{ steps.version.outputs.version }}.zip"

          xcrun notarytool submit \
            "$RUNNER_TEMP/Onset-${{ steps.version.outputs.version }}.zip" \
            --apple-id "$NOTARYTOOL_APPLE_ID" \
            --password "$NOTARYTOOL_APP_SPECIFIC_PASSWORD" \
            --team-id "$NOTARYTOOL_TEAM_ID" \
            --wait

          xcrun stapler staple "$RUNNER_TEMP/export/Onset.app"

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "Onset ${{ steps.version.outputs.version }}" \
            -srcfolder "$RUNNER_TEMP/export/Onset.app" \
            -ov \
            -format UDZO \
            "$RUNNER_TEMP/Onset-${{ steps.version.outputs.version }}.dmg"

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-artifacts-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/Onset-${{ steps.version.outputs.version }}.dmg
            ${{ runner.temp }}/Onset-${{ steps.version.outputs.version }}.zip
          if-no-files-found: error
          retention-days: 1

      # Belt-and-suspenders: covers failures in steps after the keychain/cert step
      # where the trap cannot reach (each run: block is a separate shell process).
      - name: Delete temporary keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_NAME.keychain-db" 2>/dev/null || true
          echo "Keychain cleanup complete"

  # ─────────────────────────────────────────────────────────────────────────
  # create-release
  # Creates the GitHub Release and uploads the notarized .dmg and .zip.
  # This is the only job that needs contents: write; all other jobs use read.
  # Runs on ubuntu-latest — only needs gh CLI, no macOS toolchain.
  # ─────────────────────────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: build-notarize
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write  # Required to create a GitHub Release and upload artifacts.

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts-${{ github.run_id }}
          path: ./artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.build-notarize.outputs.version }}"
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Onset ${VERSION}" \
            --generate-notes \
            --draft \
            "./artifacts/Onset-${VERSION}.dmg" \
            "./artifacts/Onset-${VERSION}.zip"
